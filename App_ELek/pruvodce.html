<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Průvodce nastavením kiosku</title>
<style>
:root {
    --blue:#00205B; --blue-2:#002a75; --red:#EE2737; --ink:#454142;
    --paper:#F4F6F9; --line:#E3E8EF; --ok:#1f9d55; --muted:#6b7482;
}
* { box-sizing:border-box; }
html, body { height:100%; }
body {
    margin:0; font-family:'Segoe UI',sans-serif; background:var(--paper); color:var(--ink);
    display:flex; height:100vh; overflow:hidden;
}

aside {
    width:272px; flex-shrink:0; color:#fff; padding:30px 22px 22px;
    display:flex; flex-direction:column;
    background:
        radial-gradient(600px 300px at -10% -10%, rgba(238,39,55,.22), transparent 60%),
        radial-gradient(circle at 1px 1px, rgba(255,255,255,.055) 1px, transparent 0) 0 0/22px 22px,
        linear-gradient(165deg, #001743 0%, var(--blue) 55%, #002d7d 100%);
}
aside .brand { display:flex; align-items:center; gap:12px; min-height:44px; }
aside .brand img { max-height:36px; max-width:120px; background:#fff; border-radius:8px; padding:4px 8px; display:none; }
aside h1 { font-size:19px; margin:0; letter-spacing:.6px; font-weight:700; }
aside .sub { color:#9fb0cf; font-size:12px; margin-top:5px; }
.kroky { margin-top:28px; display:flex; flex-direction:column; gap:3px; }
.krok-pill {
    padding:10px 12px; border-radius:10px; font-size:13.5px; color:#8fa0c2;
    display:flex; gap:11px; align-items:center; border:1px solid transparent;
    transition: background .15s, color .15s; user-select:none;
}
.krok-pill i {
    width:22px; height:22px; border-radius:50%; border:2px solid #3a4f7e; flex-shrink:0;
    display:inline-flex; align-items:center; justify-content:center; font-style:normal; font-size:11px; font-weight:700;
    transition: background .2s, border-color .2s;
}
.krok-pill.klik { cursor:pointer; }
.krok-pill.klik:hover { background:rgba(255,255,255,.07); color:#fff; }
.krok-pill.aktivni { background:rgba(255,255,255,.11); color:#fff; border-color:rgba(255,255,255,.10); }
.krok-pill.aktivni i { border-color:var(--red); background:var(--red); color:#fff; }
.krok-pill.hotovo { color:#dfe7f4; }
.krok-pill.hotovo i { border-color:var(--ok); background:var(--ok); color:#fff; }
.pokrok { margin-top:auto; }
.pokrok small { color:#9fb0cf; font-size:11.5px; letter-spacing:.4px; }
.pokrok .bar { height:6px; background:rgba(255,255,255,.14); border-radius:99px; margin-top:8px; overflow:hidden; }
.pokrok .bar i { display:block; height:100%; width:0; border-radius:99px; background:linear-gradient(90deg, var(--red), #ff7482); transition:width .35s ease; }

main { flex:1; display:flex; flex-direction:column; min-width:0; }
.obsah { flex:1; padding:36px 46px; overflow-y:auto; }
.obsah h2 { color:var(--blue); margin:0 0 6px; font-size:27px; letter-spacing:-.3px; }
.obsah .pod { color:var(--muted); margin:0 0 24px; font-size:14.5px; max-width:720px; }
footer {
    padding:15px 46px; border-top:1px solid var(--line); background:#fff;
    display:flex; justify-content:space-between; align-items:center;
}
button { font-family:inherit; font-size:15px; font-weight:600; padding:12px 26px; border-radius:10px; border:none; cursor:pointer; transition:transform .12s, box-shadow .12s, background .15s; }
button:active { transform:translateY(1px); }
.b-blue { background:var(--blue); color:#fff; box-shadow:0 6px 16px rgba(0,32,91,.22); }
.b-blue:hover { background:var(--blue-2); }
.b-blue:disabled { opacity:.45; cursor:default; box-shadow:none; }
.b-out { background:#fff; border:1.5px solid var(--line); color:var(--ink); }
.b-out:hover { border-color:var(--blue); color:var(--blue); }

label { display:block; font-size:13.5px; font-weight:600; margin:14px 0 6px; }
label .tip { font-weight:400; color:#8a929e; }
input[type=text], input[type=password] {
    width:100%; max-width:460px; padding:12px 14px; border:1.5px solid var(--line);
    border-radius:10px; font-size:15px; font-family:inherit; background:#fbfcfe;
}
input:focus, textarea:focus { outline:none; border-color:var(--blue); box-shadow:0 0 0 4px rgba(0,32,91,.10); background:#fff; }
textarea { width:100%; max-width:640px; padding:12px; border:1.5px solid var(--line); border-radius:10px; font-family:monospace; font-size:12.5px; min-height:90px; background:#fbfcfe; }

.volby { display:grid; grid-template-columns:repeat(auto-fit,minmax(215px,1fr)); gap:14px; margin-top:8px; max-width:860px; }
.volba {
    background:#fff; border:2px solid var(--line); border-radius:14px; padding:18px;
    cursor:pointer; transition:border-color .15s, transform .15s, box-shadow .15s; text-align:left;
}
.volba:hover { border-color:var(--blue); transform:translateY(-2px); box-shadow:0 10px 24px rgba(0,32,91,.08); }
.volba.vybrano { border-color:var(--red); box-shadow:0 10px 24px rgba(238,39,55,.10); }
.volba.mimo { opacity:.45; pointer-events:none; }
.volba b { display:block; color:var(--blue); margin:10px 0 6px; font-size:16px; }
.volba span { font-size:13px; color:var(--muted); line-height:1.45; }
.volba .obr { height:64px; display:flex; align-items:center; }
.volba .vlajka { font-size:30px; line-height:1; }

.stav { margin-top:14px; padding:12px 14px; border-radius:10px; font-size:14px; display:none; max-width:720px; }
.stav.ok { display:block; background:#e7f7ef; color:#0e6b39; }
.stav.chyba { display:block; background:#fdeaec; color:#a11624; }
.stav.info { display:block; background:#eef2f8; color:#39496b; }
pre.log { background:#0d1b3d; color:#c9d4e6; padding:12px 14px; border-radius:10px; font-size:11.5px; max-width:720px; overflow:auto; max-height:180px; }

.chip { display:inline-flex; align-items:center; gap:8px; font-size:13px; font-weight:600; padding:7px 13px; border-radius:99px; }
.chip::before { content:""; width:8px; height:8px; border-radius:50%; background:currentColor; }
.chip.on { background:#e7f7ef; color:#0e6b39; }
.chip.off { background:#fdf3e4; color:#8a5a00; }

.barvy { display:flex; gap:18px; align-items:flex-end; margin-top:6px; flex-wrap:wrap; }
.barvy input[type=color] { width:58px; height:42px; border:1px solid var(--line); border-radius:10px; padding:2px; background:#fff; cursor:pointer; }

code.kod { display:block; background:#0d1b3d; color:#c9d4e6; padding:14px; border-radius:10px; word-break:break-all; font-size:12px; margin-top:10px; max-width:640px; user-select:all; }
.par-karta { display:flex; gap:16px; align-items:flex-start; background:#fbfcfe; border:1px solid var(--line); border-radius:14px; padding:18px 20px; max-width:640px; }
.par-ik { width:46px; height:46px; border-radius:12px; background:#eef2fa; color:var(--blue); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.par-pole { width:100%; min-height:86px; resize:vertical; font-family:Consolas, monospace; font-size:12.5px; line-height:1.5; border:1.5px dashed #b9c4d4; border-radius:10px; padding:11px 13px; background:#fff; box-sizing:border-box; }
.par-pole:focus { border-color:var(--blue); border-style:solid; outline:none; }

.palety { display:flex; flex-direction:column; gap:8px; margin-top:4px; }
.paleta {
    display:flex; align-items:center; gap:12px; padding:11px 14px; border:2px solid var(--line);
    border-radius:11px; cursor:pointer; background:#fff; transition:border-color .15s, transform .12s;
}
.paleta:hover { border-color:var(--blue); transform:translateX(2px); }
.paleta.vybrana { border-color:var(--red); box-shadow:0 4px 14px rgba(238,39,55,.12); }
.paleta .swatche { display:flex; }
.paleta .sw { width:27px; height:27px; border-radius:50%; border:2.5px solid #fff; box-shadow:0 1px 4px rgba(0,0,0,.18); }
.paleta .sw + .sw { margin-left:-9px; }
.paleta b { font-size:13.5px; font-weight:600; }
.paleta small { display:block; font-size:11px; color:#96a0ad; }
.paleta .fajfka { margin-left:auto; color:var(--red); font-weight:800; visibility:hidden; }
.paleta.vybrana .fajfka { visibility:visible; }

.prepinac { display:inline-flex; align-items:center; gap:10px; cursor:pointer; margin-top:10px; font-size:14.5px; }
.prepinac input { width:44px; height:24px; appearance:none; background:#c8d0dc; border-radius:14px; position:relative; cursor:pointer; transition:background .15s; flex-shrink:0; }
.prepinac input:checked { background:var(--ok); }
.prepinac input::after { content:""; position:absolute; top:2px; left:2px; width:20px; height:20px; border-radius:50%; background:#fff; transition:left .15s; box-shadow:0 1px 3px rgba(0,0,0,.25); }
.prepinac input:checked::after { left:22px; }

ul.souhrn { list-style:none; padding:0; max-width:560px; }
ul.souhrn li { padding:10px 14px; border:1px solid var(--line); border-radius:10px; margin-bottom:8px; background:#fff; font-size:14px; display:flex; justify-content:space-between; gap:16px; }
ul.souhrn li b { color:var(--blue); flex-shrink:0; }
ul.souhrn li span { text-align:right; }

.logo-radek { display:flex; align-items:center; gap:14px; margin-top:12px; }
.logo-box {
    width:150px; height:64px; border:1.5px dashed var(--line); border-radius:10px; background:#fff;
    display:flex; align-items:center; justify-content:center; overflow:hidden; padding:6px;
}
.logo-box img { max-width:100%; max-height:100%; }
.logo-box small { color:#a7b0bc; font-size:12px; }

.nahled-wrap { margin-top:26px; max-width:720px; }
.nahled-wrap > label { margin-bottom:10px; }
.kiosk-prev {
    --p:#00205B; --a:#EE2737; --bg:#f4f6f9;
    border:1px solid var(--line); border-radius:16px; overflow:hidden; background:var(--bg);
    box-shadow:0 18px 46px rgba(0,32,91,.14); font-size:12px; user-select:none;
}
.kp-top { background:#fff; border-bottom:1px solid rgba(0,0,0,.06); padding:10px 16px; display:flex; justify-content:space-between; align-items:center; }
.kp-logo { display:flex; align-items:center; gap:8px; font-weight:800; font-size:15px; color:var(--p); letter-spacing:.5px; min-height:26px; }
.kp-logo img { max-height:26px; max-width:110px; }
.kp-langs { display:flex; gap:4px; }
.kp-langs span { border:1.5px solid var(--line); border-radius:6px; padding:3px 7px; font-weight:700; font-size:10px; color:#6b7482; background:#fff; }
.kp-langs span.on { background:var(--p); border-color:var(--p); color:#fff; }
.kp-hero { text-align:center; padding:26px 16px 6px; }
.kp-hero b { display:block; font-size:22px; color:var(--p); letter-spacing:-.4px; }
.kp-hero small { color:#6b7482; font-size:12px; }
.kp-menu { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; padding:18px 20px 24px; }
.kp-btn { background:#fff; border:1.5px solid rgba(0,0,0,.08); border-radius:12px; padding:14px 12px; min-height:74px; }
.kp-btn b { display:block; color:var(--p); font-size:13px; margin-bottom:4px; }
.kp-btn span { color:#6b7482; font-size:10.5px; line-height:1.35; display:block; }
.kp-btn.leave { border-color:var(--a); }
.kp-btn.leave b { color:var(--a); }

@keyframes stepIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }
.obsah > * { animation:stepIn .28s ease both; }
:focus-visible { outline:3px solid #35b6d8; outline-offset:2px; border-radius:6px; }
.napoveda-odkaz { display:inline-flex; width:17px; height:17px; border-radius:50%; background:var(--blue); color:#fff; font-size:11px; font-weight:700; align-items:center; justify-content:center; cursor:pointer; vertical-align:middle; margin-left:6px; }
.modal-pozadi { position:fixed; inset:0; background:rgba(10,20,45,.5); display:none; align-items:center; justify-content:center; z-index:50; }
.modal-pozadi.zobrazit { display:flex; }
.modal { background:#fff; border-radius:14px; max-width:520px; width:92%; padding:22px 24px; box-shadow:0 30px 80px rgba(0,0,0,.35); }
.modal h3 { margin:0 0 10px; color:var(--blue); font-size:17px; }
.modal p, .modal ol { font-size:13.5px; line-height:1.6; }
.modal ol { padding-left:20px; margin:8px 0; }
.modal .patka { display:flex; gap:8px; justify-content:flex-end; margin-top:14px; }
.blok {
    background:#fff; border:1px solid var(--line); border-radius:14px; max-width:680px;
    margin-top:18px; box-shadow:0 8px 22px rgba(0,32,91,.05); overflow:hidden;
}
.blok-hlava { display:flex; align-items:center; gap:12px; padding:16px 20px; }
.blok-ik {
    width:36px; height:36px; border-radius:10px; background:#eef2f8; color:var(--blue);
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.blok-hlava b { color:var(--blue); font-size:15px; }
.blok-hlava small { display:block; font-weight:400; color:var(--muted); font-size:12.5px; margin-top:2px; }
.stitek {
    margin-left:auto; font-size:10.5px; font-weight:700; letter-spacing:.6px; text-transform:uppercase;
    color:#8a5a00; background:#fdf3e4; border-radius:99px; padding:4px 11px; flex-shrink:0;
}
.stitek.modry { color:#39496b; background:#eef2f8; }
.blok-telo { padding:2px 20px 20px 68px; }
.blok-telo label:first-child { margin-top:0; }
@media (max-width:760px) { .blok-telo { padding-left:20px; } }

details.blok summary { list-style:none; cursor:pointer; }
details.blok summary::-webkit-details-marker { display:none; }
details.blok summary .sipecka { margin-left:12px; color:#a7b0bc; font-size:11px; transition:transform .18s; flex-shrink:0; }
details.blok[open] summary .sipecka { transform:rotate(90deg); }
details.blok summary:hover { background:#fafbfd; }
details.blok[open] summary { border-bottom:1px solid var(--line); margin-bottom:14px; }

.pole-mriz { display:grid; grid-template-columns:1fr 1fr; gap:0 16px; max-width:640px; }
.pole-mriz .cely { grid-column:1 / -1; }
.pole-mriz input { max-width:none; }
@media (max-width:700px) { .pole-mriz { grid-template-columns:1fr; } }

.mini-kroky { margin-top:16px; }
.mini-krok { display:flex; gap:14px; padding:13px 0; align-items:flex-start; }
.mini-krok + .mini-krok { border-top:1px dashed var(--line); }
.mini-krok .mc {
    width:27px; height:27px; border-radius:50%; border:2px solid #c8d0dc; color:#8a929e;
    font-size:12px; font-weight:700; display:flex; align-items:center; justify-content:center;
    flex-shrink:0; background:#fff; transition:background .2s, border-color .2s, color .2s; margin-top:1px;
}
.mini-krok.hotovo .mc { border-color:var(--ok); background:var(--ok); color:#fff; }
.mini-krok .mt { flex:1; min-width:0; }
.mini-krok .mt b { display:block; font-size:13.5px; color:var(--ink); }
.mini-krok.hotovo .mt b { color:#0e6b39; }
.mini-krok .mt span { display:block; font-size:12.5px; color:var(--muted); line-height:1.55; margin-top:3px; }
.mini-krok > button { flex-shrink:0; align-self:center; }
.b-mini { padding:9px 16px; font-size:13px; border-radius:9px; }

.eyebrow {
    font-size:11.5px; font-weight:700; letter-spacing:1.4px; text-transform:uppercase;
    color:var(--red); margin-bottom:8px;
}

details { margin-top:20px; max-width:640px; }
details summary { cursor:pointer; font-size:13.5px; font-weight:600; color:var(--blue); }
</style>
</head>

    <div class="brand">
        <img id="aside-logo" alt="">
        <div>
            <h1 id="aside-firma">Kiosek</h1>

</main>

function preskocit(id) {
    if (id === 'databaze' && stav.role === 'kiosek') return true;
    if (id === 'propojeni' && stav.role === 'oboji') return true;
    if (id === 'tablet' && stav.role === 'server') return true;
    if (id === 'vzhled' && stav.role === 'server') return true;
    return false;
}

function vykresliKroky() {
    document.getElementById('kroky').innerHTML = KROKY.map((k, i) => {
        const klik = i !== aktualni && i <= maxNavstiveny && !preskocit(k.id);
        const tridy = ['krok-pill', i === aktualni ? 'aktivni' : '', i < aktualni ? 'hotovo' : '', klik ? 'klik' : ''].join(' ');
        const znak = i < aktualni ? '✓' : (i + 1);
        return `<div class="${tridy}" ${klik ? `onclick="skocNaKrok(${i})"` : ''} title="${klik ? 'Vrátit se na tento krok' : ''}"><i>${znak}</i>${k.nazev}</div>`;
    }).join('');
    const procent = Math.round(aktualni / (KROKY.length - 1) * 100);
    document.getElementById('pokrok-bar').style.width = procent + '%';
    document.getElementById('pokrok-text').innerText = `Krok ${aktualni + 1} z ${KROKY.length}`;
}

function skocNaKrok(i) {
    if (i > maxNavstiveny || preskocit(KROKY[i].id)) return;
    if (KROKY[aktualni].id === 'tablet') ukliditPadDemo();
    ulozPoleBezValidace();
    aktualni = i;
    vykresli();
}

async function krok(smer) {
    if (smer > 0 && !(await opustitKrok())) return;
    if (smer < 0) ulozPoleBezValidace();
    if (KROKY[aktualni].id === 'tablet') ukliditPadDemo();
    let n = aktualni + smer;
    while (n > 0 && n < KROKY.length && preskocit(KROKY[n].id)) n += smer;
    aktualni = Math.min(Math.max(n, 0), KROKY.length - 1);
    maxNavstiveny = Math.max(maxNavstiveny, aktualni);
    vykresli();
}

function ulozPoleBezValidace() {
    const g = id => document.getElementById(id);
    if (g('db-host')) {
        stav.db.host = g('db-host').value.trim();
        stav.db.port = Number(g('db-port').value.trim()) || 3306;
        stav.db.user = g('db-user').value.trim();
        stav.db.password = g('db-pass').value;
        stav.db.database = g('db-name').value.trim();
    }
    if (g('discord-url')) stav.discordWebhook = g('discord-url').value.trim();
    if (g('ssh-cil')) stav.sshCil = g('ssh-cil').value.trim();
    if (g('wl-key')) { stav.wacomKey = g('wl-key').value.trim(); stav.wacomSecret = g('wl-secret').value.trim(); }
    if (g('parovaci-kod')) stav.parovaciKod = g('parovaci-kod').value;
    if (g('firma-nazev')) {
        stav.vzhled.companyName = g('firma-nazev').value.trim();
        stav.vzhled.primarni = g('barva-primarni').value;
        stav.vzhled.akcent = g('barva-akcent').value;
        stav.vzhled.pozadi = g('barva-pozadi').value;
        stav.vzhled.font = g('font-nazev').value.trim() || null;
        stav.vzhled.zdroj = g('web-url').value.trim();
        stav.sprava = g('prep-sprava').checked;
        stav.autostart = g('prep-autostart').checked;
    }
}

async function nactiRucniUdaje() {
    const cil = document.getElementById('rucni-udaje');
    if (!cil) return;
    try {
        const kod = await ipcRenderer.invoke('parovani-vytvor');
        if (!kod) { cil.innerHTML = '<div class="stav chyba" style="display:block;">Server ještě nemá API klíč – vraťte se o krok zpět a dokončete databázi.</div>'; return; }
        const u = JSON.parse(atob(kod));
        cil.innerHTML = `
            <span style="font-size:13px; color:var(--muted); line-height:1.55; display:block;">Tyhle dvě hodnoty zadáte na kiosku do polí „IP adresa serveru" a „API klíč serveru".</span>
            <label style="margin-top:12px;">Adresa serveru</label>
            <code class="kod" style="font-size:15px; padding:11px 14px;">${u.host}${u.port && u.port !== 3000 ? ':' + u.port : ''}</code>
            <label style="margin-top:12px;">API klíč</label>
            <code class="kod">${u.apiKey}</code>`;
    } catch (e) {
        cil.innerHTML = '<div class="stav chyba" style="display:block;">Údaje se nepodařilo načíst: ' + e.message + '</div>';
    }
}

const nactenaPisma = new Set();
function nactiWebFont(nazev) {
    nazev = String(nazev || '').trim();
    if (!nazev || nactenaPisma.has(nazev) || !/^[A-Za-z0-9][A-Za-z0-9 \-]{1,38}$/.test(nazev)) return;
    nactenaPisma.add(nazev);
    const l = document.createElement('link');
    l.rel = 'stylesheet';
    l.href = 'https://fonts.googleapis.com/css2?family=' + encodeURIComponent(nazev).replace(/%20/g, '+') + ':wght@400;600;700;800&display=swap';
    document.head.appendChild(l);
}

function fontZmeneno(v) {
    stav.vzhled.font = v.trim() || null;
    if (stav.vzhled.font) nactiWebFont(stav.vzhled.font);
    obnovNahled();
}

function barvaZmenena() { obnovNahled(); vykresliPalety(); }

const KURATOVANE = [
    { nazev: 'Modrá klasika',   primarni: '#00205b', akcent: '#ee2737', pozadi: '#f4f6f9', text: '#454142' },
    { nazev: 'Lesní',           primarni: '#1b4d3e', akcent: '#d98e2b', pozadi: '#f5f7f4', text: '#454142' },
    { nazev: 'Antracit',        primarni: '#23272e', akcent: '#e05a3a', pozadi: '#f5f5f6', text: '#454142' }
];
let aiPalety = [];

function vsechnyPalety() { return [...aiPalety, ...KURATOVANE]; }

function vykresliPalety() {
    const el = document.getElementById('palety');
    if (!el) return;
    const g = id => document.getElementById(id);
    const aktivni = (g('barva-primarni') ? g('barva-primarni').value : stav.vzhled.primarni)
        + (g('barva-akcent') ? g('barva-akcent').value : stav.vzhled.akcent);
    el.innerHTML = vsechnyPalety().map((p, i) => `
        <div class="paleta ${p.primarni + p.akcent === aktivni ? 'vybrana' : ''}" onclick="pouzijPaletu(${i})">
            <span class="swatche">
                <span class="sw" style="background:${p.primarni}"></span>
                <span class="sw" style="background:${p.akcent}"></span>
                <span class="sw" style="background:${p.pozadi}; border-color:#e3e8ef;"></span>
            </span>
            <span><b>${p.nazev}</b>${p.ai ? '<small>návrh podle vaší značky</small>' : ''}</span>
            <span class="fajfka">✓</span>
        </div>`).join('');
}

function pouzijPaletu(i) {
    const p = vsechnyPalety()[i];
    if (!p) return;
    stav.vzhled.primarni = p.primarni;
    stav.vzhled.akcent = p.akcent;
    stav.vzhled.pozadi = p.pozadi;
    stav.vzhled.text = p.text;
    const g = id => document.getElementById(id);
    if (g('barva-primarni')) g('barva-primarni').value = p.primarni;
    if (g('barva-akcent')) g('barva-akcent').value = p.akcent;
    if (g('barva-pozadi')) g('barva-pozadi').value = p.pozadi;
    if (p.font) {
        stav.vzhled.font = p.font;
        if (g('font-nazev')) g('font-nazev').value = p.font;
        nactiWebFont(p.font);
    }
    vykresliPalety();
    obnovNahled();
}
function firmaZmenena(v) {
    document.getElementById('aside-firma').innerText = v || 'Kiosek';
    obnovNahled();
}
function popisLoga(cesta) {
    const nazev = String(cesta).split(/[\\/]/).pop();
    return 'Vybráno: ' + nazev;
}

async function opustitKrok() {
    const id = KROKY[aktualni].id;
    if (id === 'role' && !stav.role) { alert('Vyberte prosím roli zařízení.'); return false; }
    if (id === 'databaze') {
        ulozPoleBezValidace();
        if (!stav.db.ok) {
            const s = document.getElementById('db-stav');
            s.className = 'stav chyba';
            s.innerText = 'Nejdřív prosím založte nebo připojte databázi tlačítkem výše.';
            return false;
        }
    }
    if (id === 'tablet') ulozPoleBezValidace();
    if (id === 'propojeni' && stav.role === 'kiosek' && !stav.hotovo.parovani) {
        const host = document.getElementById('rucni-host').value.trim();
        const klic = document.getElementById('rucni-klic').value.trim();
        if (host && klic) {
            await ipcRenderer.invoke('env-zapis', 'aplikace', { API_HOST: host, API_KEY: klic });
            stav.hotovo.parovani = host;
        } else {
            const s = document.getElementById('par-stav');
            s.className = 'stav chyba';
            s.innerText = 'Použijte párovací kód, nebo vyplňte IP a API klíč ručně.';
            return false;
        }
    }
    if (id === 'vzhled') ulozPoleBezValidace();
    if (id === 'souhrn') { await dokonci(); return false; }
    return true;
}

async function najdiTablet() {
    const s = document.getElementById('tablet-stav');
    try {
        let zarizeni = await navigator.hid.getDevices();
        let wacomy = zarizeni.filter(d => d.vendorId === 0x056A);
        if (!wacomy.length) {
            const vyber = await navigator.hid.requestDevice({ filters: [{ vendorId: 0x056A }] });
            wacomy = (vyber || []).filter(d => d.vendorId === 0x056A);
        }
        if (!wacomy.length) { s.className = 'stav chyba'; s.innerText = 'Tablet nenalezen. Zkontrolujte USB kabel.'; return; }
        vykresliTablety(wacomy);
    } catch (e) { s.className = 'stav chyba'; s.innerText = e.message; }
}

function vykresliTablety(wacomy) {
    const s = document.getElementById('tablet-stav');
    if (wacomy.length === 1) {
        stav.tablet = wacomy[0].productName || 'Wacom STU';
        stav.tabletId = (wacomy[0].productId || 0);
        s.className = 'stav ok'; s.innerText = 'Nalezen: ' + stav.tablet;
        return;
    }
    s.className = 'stav ok';
    s.innerHTML = 'Nalezeno více tabletů – vyberte, který používáte:<div style="display:flex; flex-direction:column; gap:8px; margin-top:10px;">'
        + wacomy.map((d, i) => {
            const nazev = (d.productName || 'Wacom STU') + (d.productId ? ' (0x' + d.productId.toString(16) + ')' : '');
            const vybrany = stav.tabletId === d.productId;
            return `<button class="b-out b-mini" style="text-align:left; ${vybrany ? 'border-color:var(--red); color:var(--blue); font-weight:700;' : ''}" onclick="vyberTablet(${i})">${nazev}${vybrany ? ' ✓' : ''}</button>`;
        }).join('') + '</div>';
    window._wacomySeznam = wacomy;
}

function vyberTablet(i) {
    const d = (window._wacomySeznam || [])[i];
    if (!d) return;
    stav.tablet = d.productName || 'Wacom STU';
    stav.tabletId = d.productId || 0;
    vykresliTablety(window._wacomySeznam);
}

function nactiObrazek(dataUrl) {
    return new Promise(resolve => {
        if (!dataUrl) return resolve(null);
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => resolve(null);
        img.src = dataUrl;
    });
}

async function kresliPadKompozice(W, H) {
    const off = document.createElement('canvas');
    off.width = W; off.height = H;
    const c = off.getContext('2d');
    c.fillStyle = '#FFFFFF'; c.fillRect(0, 0, W, H);

    const napis = (text, vaha, velikost, y) => {
        if (!text) return;
        c.fillStyle = '#000000';
        c.textAlign = 'center'; c.textBaseline = 'middle';
        const sirkaPri = px => { c.font = `${vaha} ${px}px Arial, sans-serif`; return c.measureText(text).width; };
        let px = velikost;
        while (px > Math.max(11, velikost * 0.7) && sirkaPri(px) > W * 0.94) px--;
        if (sirkaPri(px) <= W * 0.94) { c.fillText(text, W / 2, y); return; }
        const slova = text.split(' ');
        let radek1 = text, radek2 = '';
        if (slova.length > 1) {
            let nejlepsi = 1, rozdil = Infinity;
            for (let i = 1; i < slova.length; i++) {
                const a = slova.slice(0, i).join(' ').length, b = slova.slice(i).join(' ').length;
                if (Math.abs(a - b) < rozdil) { rozdil = Math.abs(a - b); nejlepsi = i; }
            }
            radek1 = slova.slice(0, nejlepsi).join(' ');
            radek2 = slova.slice(nejlepsi).join(' ');
        }
        px = velikost;
        const nejsirsi = pxx => { c.font = `${vaha} ${pxx}px Arial, sans-serif`; return Math.max(c.measureText(radek1).width, c.measureText(radek2).width); };
        while (px > 10 && nejsirsi(px) > W * 0.94) px--;
        c.font = `${vaha} ${px}px Arial, sans-serif`;
        c.fillText(radek1, W / 2, y - px * 0.62);
        if (radek2) c.fillText(radek2, W / 2, y + px * 0.62);
    };

    const vlastni = stav.tabletObrazek ? await nactiObrazek(stav.tabletObrazek.dataUrl) : null;
    const logo = !vlastni && stav.logoNahled ? await nactiObrazek(stav.logoNahled) : null;

    if (vlastni) {
        const maxW = W * 0.94, maxH = H * 0.72;
        const scale = Math.min(maxW / vlastni.width, maxH / vlastni.height);
        const lw = Math.max(1, Math.round(vlastni.width * scale));
        const lh = Math.max(1, Math.round(vlastni.height * scale));
        c.imageSmoothingEnabled = true;
        c.drawImage(vlastni, Math.round((W - lw) / 2), Math.round(H * 0.40 - lh / 2), lw, lh);
        napis('Vyčkejte prosím na pokyn k podpisu', 700, Math.floor(H * 0.075), H * 0.88);
    } else if (logo) {
        const maxW = W * 0.86, maxH = H * 0.46;
        const scale = Math.min(maxW / logo.width, maxH / logo.height);
        const lw = Math.max(1, Math.round(logo.width * scale));
        const lh = Math.max(1, Math.round(logo.height * scale));
        c.imageSmoothingEnabled = true;
        c.drawImage(logo, Math.round((W - lw) / 2), Math.round(H * 0.28 - lh / 2), lw, lh);
        napis('Crafted to Perfection', 700, Math.floor(H * 0.085), H * 0.62);
        napis('Vyčkejte prosím na pokyn k podpisu', 700, Math.floor(H * 0.075), H * 0.85);
    } else {
        c.fillStyle = '#000000';
        c.textAlign = 'center'; c.textBaseline = 'middle';
        c.font = `800 ${Math.floor(H * 0.24)}px Arial, sans-serif`;
        c.fillText(stav.vzhled.companyName || 'GuestBook', W / 2, H * 0.30);
        napis('Vyčkejte prosím na pokyn k podpisu', 700, Math.floor(H * 0.075), H * 0.84);
    }

    const data = c.getImageData(0, 0, W, H);
    for (let i = 0; i < data.data.length; i += 4) {
        const jas = 0.299 * data.data[i] + 0.587 * data.data[i + 1] + 0.114 * data.data[i + 2];
        const v = jas < 160 ? 0 : 255;
        data.data[i] = data.data[i + 1] = data.data[i + 2] = v;
        data.data[i + 3] = 255;
    }
    c.putImageData(data, 0, 0);
    return off;
}

let padDemo = { modul: null, stu: null, sdk: null, device: null, penDown: false, maxX: 0, maxY: 0 };

async function padSdk() {
    if (padDemo.modul) return padDemo.modul;
    const path = require('path');
    const factory = require(path.join(__dirname, 'node_modules', '@wacom', 'signature-sdk', 'dist', 'signature-sdk.cjs'));
    padDemo.modul = (typeof factory === 'function') ? await factory()
        : (factory && typeof factory.default === 'function') ? await factory.default()
        : factory;
    return padDemo.modul;
}

async function padUkazka() {
    const s = document.getElementById('pad-stav');
    s.className = 'stav info'; s.innerText = 'Připojuji tablet…';
    try {
        const sdk = await padSdk();
        if (!sdk.STUDevice) throw new Error('Ve WASM modulu chybí třída STUDevice.');

        if (!padDemo.stu) {
            let device = (await navigator.hid.getDevices()).find(d => d.vendorId === 0x056A);
            if (!device) {
                const vyber = await navigator.hid.requestDevice({ filters: [{ vendorId: 0x056A }] });
                device = vyber && vyber[0];
            }
            if (!device) throw new Error('Tablet nenalezen. Zkontrolujte USB kabel.');
            try { if (device.opened) await device.close(); } catch (e) {}

            const stu = new sdk.STUDevice(device);
            await stu.connect(false);
            try { await Promise.resolve(stu.reset()); await new Promise(r => setTimeout(r, 300)); } catch (e) {}

            let cap = null;
            for (let i = 0; i < 10; i++) {
                try { cap = await Promise.resolve(stu.getCapability()); } catch (e) { cap = null; }
                if (cap && cap.tabletMaxX && cap.tabletMaxY) break;
                await new Promise(r => setTimeout(r, 150));
            }
            if (!cap || !cap.tabletMaxX) throw new Error('Tablet neodpovídá. Odpojte jej z USB a znovu připojte.');

            padDemo.stu = stu; padDemo.sdk = sdk; padDemo.device = device;
            padDemo.maxX = cap.tabletMaxX; padDemo.maxY = cap.tabletMaxY;
            padDemo.cap = cap;
            stav.tablet = device.productName || 'Wacom STU';

            const canvas = document.getElementById('pad-canvas');
            const ctx = canvas.getContext('2d');
            stu.addPenDataListener(sdk.PenDataType.PEN_DATA, (pd) => {
                try {
                    const down = (pd.sw === 1) || (pd.pressure > 0);
                    const x = pd.x / padDemo.maxX * canvas.width;
                    const y = pd.y / padDemo.maxY * canvas.height;
                    if (down) {
                        ctx.strokeStyle = stav.vzhled.akcent || '#EE2737';
                        ctx.lineWidth = 2; ctx.lineCap = 'round';
                        if (!padDemo.penDown) { ctx.beginPath(); ctx.moveTo(x, y); padDemo.penDown = true; }
                        else { ctx.lineTo(x, y); ctx.stroke(); }
                    } else padDemo.penDown = false;
                } catch (e) {}
            });
            stu.startEventHandler();
        }

        await padPreklopObrazek();
        try { await Promise.resolve(padDemo.stu.setInkingMode(padDemo.sdk.InkingMode.On)); } catch (e) {}
        s.className = 'stav ok';
        s.innerText = 'Obrázek je na displeji. Zkuste se podepsat perem – tahy uvidíte v náhledu i na tabletu.';
    } catch (e) {
        s.className = 'stav chyba';
        s.innerText = 'Ukázka se nepovedla: ' + (e.message || e);
    }
}

async function padPreklopObrazek() {
    if (!padDemo.stu) return;
    const sdk = padDemo.sdk, stu = padDemo.stu;
    const W = (padDemo.cap && padDemo.cap.screenWidth) ? padDemo.cap.screenWidth : 320;
    const H = (padDemo.cap && padDemo.cap.screenHeight) ? padDemo.cap.screenHeight : 200;
    const off = await kresliPadKompozice(W, H);
    let vec = null;
    try {
        try { await Promise.resolve(stu.setClearScreen()); } catch (e) {}
        vec = await Promise.resolve(sdk.ProtocolHelper.resizeAndFlatten(
            off, 0, 0, W, H, W, H,
            sdk.EncodingMode.EncodingMode_1bit, sdk.Scale.Scale_Stretch,
            'white', 0, false
        ));
        await Promise.resolve(stu.writeImage(sdk.EncodingMode.EncodingMode_1bit, vec));
    } finally {
        try { if (vec && typeof vec.delete === 'function') vec.delete(); } catch (e) {}
    }
}

async function ukliditPadDemo() {
    const d = padDemo;
    if (!d.stu) return;
    padDemo = { modul: d.modul, stu: null, sdk: null, device: null, penDown: false, maxX: 0, maxY: 0 };
    try { d.stu.stopEventHandler(); } catch (e) {}
    try { await Promise.resolve(d.stu.setInkingMode(d.sdk.InkingMode.Off)); } catch (e) {}
    try { await Promise.resolve(d.stu.setClearScreen()); } catch (e) {}
    try { await Promise.resolve(d.stu.disconnect()); } catch (e) {}
    try { if (d.device && d.device.opened) await d.device.close(); } catch (e) {}
}

            await ipcRenderer.invoke('ssh-instaluj');

        sshOznac('klient', true);
        sshStavHlas('ok', 'SSH klient nainstalován – pokračujte krokem 2.');

                btn.disabled = false;
                s.className = 'stav chyba';
                s.innerText = 'Server se nepodařilo spustit: ' + (r.chyba || 'neznámá chyba') + ' Nastavení je uložené – opravte problém a dokončete znovu.';
                if (r.log && r.log.length) extra.innerHTML = `<pre class="log">${r.log.join('\n').replace(/</g, '&lt;')}</pre>`;
                return;
            }
            s.className = 'stav ok';
            s.innerText = `Server běží na portu ${r.port}.` + (stav.sprava ? ' Adresa správy se hlásí v konzoli' + (stav.discordWebhook ? ' a na Discordu.' : '.') : '');
        }

        if (stav.role === 'server') {
            s.className = 'stav ok';
            s.innerText += ' Hotovo – tohle zařízení běží jako server.';
            extra.innerHTML = `<div style="margin-top:14px; display:flex; gap:10px;">
                <button class="b-blue" onclick="ipcRenderer.invoke('otevri-spravu')">Otevřít správu</button>
                <button class="b-out" onclick="window.close()">Zavřít průvodce</button>
            </div>`;
            await ipcRenderer.invoke('dokoncit-pruvodce', false);
            return;
        }

        s.className = 'stav ok'; s.innerText = (s.innerText.startsWith('Server') ? s.innerText + ' ' : '') + 'Hotovo, spouštím kiosek…';
        if (stav.sshCil) { try { await ipcRenderer.invoke('ssh-uloz', stav.sshCil); } catch (e) {} }
        setTimeout(() => ipcRenderer.invoke('dokoncit-pruvodce', true), 900);
    } catch (e) {
        btn.disabled = false;
        s.className = 'stav chyba'; s.innerText = 'Dokončení selhalo: ' + e.message;
    }
}

(async () => {
    cesty = await ipcRenderer.invoke('cesty');
    if (!cesty.serverExistuje) stav.role = 'kiosek';
    try {
        const ea = await ipcRenderer.invoke('env-cti', 'aplikace');
        if (ea.LANG) stav.jazyk = ea.LANG;
        if (ea.COMPANY_NAME) stav.vzhled.companyName = ea.COMPANY_NAME;
        if (ea.WACOM_LICENCE_KEY) stav.wacomKey = ea.WACOM_LICENCE_KEY;
        if (ea.WACOM_LICENCE_SECRET) stav.wacomSecret = ea.WACOM_LICENCE_SECRET;

        const es = await ipcRenderer.invoke('env-cti', 'server');
        if (es.DISCORD_WEBHOOK_URL) stav.discordWebhook = es.DISCORD_WEBHOOK_URL;
        if (es.DB_HOST) stav.db.host = es.DB_HOST;
        if (es.DB_PORT) stav.db.port = Number(es.DB_PORT) || 3306;
        if (es.DB_USER) stav.db.user = es.DB_USER;
        if (es.DB_PASSWORD !== undefined && es.DB_PASSWORD !== '') stav.db.password = es.DB_PASSWORD;
        if (es.DB_NAME) stav.db.database = es.DB_NAME;

        const t = await ipcRenderer.invoke('vzhled-cti');
        if (t && t.primarni) {
            stav.vzhled.primarni = t.primarni;
            stav.vzhled.akcent = t.akcent || stav.vzhled.akcent;
            stav.vzhled.pozadi = t.pozadi || stav.vzhled.pozadi;
            stav.vzhled.text = t.text || stav.vzhled.text;
            stav.vzhled.logo = t.logo || stav.vzhled.logo;
            if (t.font) { stav.vzhled.font = t.font; nactiWebFont(t.font); }
            if (t.companyName) stav.vzhled.companyName = t.companyName;
            if (t.zdroj) stav.vzhled.zdroj = t.zdroj;
            if (t.tabletObrazek) {
                const nahled = await ipcRenderer.invoke('logo-data', t.tabletObrazek);
                if (nahled) stav.tabletObrazek = { cesta: t.tabletObrazek, nazev: t.tabletObrazek.split(/[\\/]/).pop(), dataUrl: nahled };
            }
        }
        if (stav.vzhled.logo) {
            stav.logoNahled = await ipcRenderer.invoke('logo-data', stav.vzhled.logo);
            const asideLogo = document.getElementById('aside-logo');
            if (stav.logoNahled && asideLogo) { asideLogo.src = stav.logoNahled; asideLogo.style.display = 'block'; }
        }
        if (stav.vzhled.companyName) document.getElementById('aside-firma').innerText = stav.vzhled.companyName;
    } catch (e) {}
    vykresli();
})();

const NAPOVEDY = {
    discord: {
        titulek: 'Jak získat Discord webhook (hlášení o provozu)',
        telo: `<p>Webhook je adresa kanálu, kam GuestBook posílá hlášení – výpadky, adresu správy a podobně.</p>
            <ol>
                <li>V Discordu otevřete svůj server a kanál, kam mají zprávy chodit.</li>
                <li><b>Nastavení kanálu → Integrace → Webhooky → Nový webhook</b>.</li>
                <li>Klikněte na <b>„Kopírovat URL webhooku"</b> a vložte ji sem.</li>
            </ol>`,
        odkaz: 'https://support.discord.com/hc/articles/228383668', odkazText: 'Návod na webu Discordu'
    },
    apiklic: {
        titulek: 'Co je API klíč serveru',
        telo: `<p>API klíč je heslo, kterým se kiosek prokazuje serveru. Server si ho vygeneroval při své instalaci.</p>
            <p>Nejjednodušší je použít <b>párovací kód</b> výše – přenese adresu i klíč najednou. Ručně ho najdete na serveru v Nastavení → Pro pokročilé → API_KEY, nebo ve výpisu serveru při startu.</p>`
    }
};
function ukazNapovedu(id) {
    const n = NAPOVEDY[id];
    if (!n) return;
    document.getElementById('modal-titulek').innerText = n.titulek;
    document.getElementById('modal-telo').innerHTML = n.telo;
    const odkazBtn = document.getElementById('modal-odkaz');
    if (n.odkaz) {
        odkazBtn.style.display = 'inline-block';
        odkazBtn.innerText = n.odkazText || 'Otevřít návod';
        odkazBtn.onclick = () => ipcRenderer.invoke('otevri-odkaz', n.odkaz);
    } else odkazBtn.style.display = 'none';
    document.getElementById('modal-pozadi').classList.add('zobrazit');
}
function zavriNapovedu() { document.getElementById('modal-pozadi').classList.remove('zobrazit'); }
</script>
<div class="modal-pozadi" id="modal-pozadi" onclick="if(event.target===this)zavriNapovedu()">
    <div class="modal">
        <h3 id="modal-titulek"></h3>
        <div id="modal-telo"></div>
        <div class="patka">
            <button class="b-blue" id="modal-odkaz" style="display:none; padding:9px 16px; font-size:13.5px;"></button>
            <button class="b-out" style="padding:9px 16px; font-size:13.5px;" onclick="zavriNapovedu()">Zavřít</button>
        </div>
    </div>
</div>
</body>
</html>
